
# ─────────────────────────────────────────────────────────────────────────────
# Datacenter Digital Twin — 풀스택 데모 인프라
#
# 실행:
#   cd extension/datacenter_monitor/kafka-dummy
#   docker compose up -d --build
#
# 서비스 기동 순서 (자동):
#   kafka → minio → minio-init → nessie → trino
#                              → seed-data → loop-producer
#                                          → kafka-ingestor
#   kafka + trino → query-server
#
# 접속 주소:
#   Kafka          : localhost:9092  (Omniverse Extension)
#   MinIO Console  : http://localhost:9001  (admin: minioadmin/minioadmin)
#   Nessie API     : http://localhost:19120
#   Trino UI       : http://localhost:8080
#   Query Server   : http://localhost:8000  (FastAPI)
#   Query Server Docs: http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (KRaft 모드) ──────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:4.0.0
    container_name: dc_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INT://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /tmp/kafka-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── MinIO (S3 호환 오브젝트 스토리지 — Rook Ceph 데모 대체) ────────────────
  minio:
    image: minio/minio:latest
    container_name: dc_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 웹 콘솔
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── MinIO 버킷 초기화 (one-shot) ────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: dc_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/warehouse --ignore-existing &&
      echo '[minio-init] warehouse 버킷 준비 완료'
      "

  # ── Nessie (Iceberg REST Catalog) ───────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: dc_nessie
    restart: unless-stopped
    ports:
      - "19120:19120"
    environment:
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY   # 데모용: 영속성 불필요
      QUARKUS_HTTP_PORT: 19120
      # Nessie 0.100+ : Management 인터페이스(헬스체크)가 9000번 포트로 분리됨
      QUARKUS_MANAGEMENT_PORT: 9000
      QUARKUS_OIDC_ENABLED: "false"
      QUARKUS_HTTP_AUTH_PROACTIVE: "false"
      NESSIE_SERVER_AUTHENTICATION_ENABLED: "false"
      # Nessie 0.100+ : Iceberg REST Catalog + warehouse 명시 등록 필수
      NESSIE_CATALOG_ENABLED: "true"
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: warehouse
      NESSIE_CATALOG_WAREHOUSES__warehouse__LOCATION: "s3://warehouse/"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: "http://minio:9000"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE: APPLICATION_GLOBAL
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      # Nessie 0.100+ : /q/health/ready 는 Management 포트(9000)에 있음
      test: ["CMD-SHELL", "curl -f http://localhost:9000/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Trino (쿼리 엔진) ────────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:435
    container_name: dc_trino
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    depends_on:
      nessie:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── Seed Data (one-shot: 5분치 정적 데이터 → MinIO/Iceberg 적재) ─────────────
  seed-data:
    build:
      context: ./seed-data
    container_name: dc_seed_data
    restart: "no"
    depends_on:
      nessie:
        condition: service_healthy
    environment:
      CATALOG_URI: http://nessie:19120/iceberg/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WAREHOUSE: warehouse          # Nessie 0.100+: URI 대신 등록된 warehouse 이름 사용
      # boto3가 MinIO를 S3로 인식하도록
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1

  # ── Loop Producer (seed 데이터를 루프로 Kafka 전송 — dummy-producer 대체) ────
  loop-producer:
    build:
      context: ./loop-producer
    container_name: dc_loop_producer
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      nessie:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: datacenter.metrics
      INTERVAL: "1.0"
      CATALOG_URI: http://nessie:19120/iceberg/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WAREHOUSE: warehouse          # Nessie 0.100+: URI 대신 등록된 warehouse 이름 사용
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1

  # ── Event Producer (dc.events_seed → datacenter.metrics.event ループ送信) ──
  event-producer:
    build:
      context: ./event-producer
    container_name: dc_event_producer
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      nessie:
        condition: service_healthy
      seed-data:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: datacenter.metrics.event
      INTERVAL: "1.0"
      CATALOG_URI: http://nessie:19120/iceberg/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WAREHOUSE: warehouse
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1

  # ── Query Server (FastAPI — React 대시보드 백엔드) ──────────────────────────
  query-server:
    build:
      context: ./query-server
    container_name: dc_query_server
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      # KAFKA_BROKER: kafka:29092
      KAFKA_BROKER: 10.32.161.108:32569
      KAFKA_TOPIC: datacenter.metrics
      KAFKA_REPLAY_TOPIC: datacenter.metrics.replay
      KAFKA_EVENT_TOPIC: datacenter.metrics.event
      KAFKA_REPLAY_EVENT_TOPIC: datacenter.metrics.replay.event
      TRINO_HOST: 10.32.161.108
      TRINO_PORT: "31010"
      TRINO_USER: trino
      TRINO_CATALOG: bronze_cat
      TRINO_SCHEMA: telemetry
      CF_TURN_KEY_ID: "5f5c2a08cc210fa78c50512630e40ff2"
      CF_API_TOKEN: "4cff16329576f44af27f8f25cee0c11043895f136b5a131af78f11f4940d9fec"

volumes:
  minio-data:

networks:
  default:
    name: datacenter_net
