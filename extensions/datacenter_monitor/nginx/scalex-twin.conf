# ============================================================
# ScaleX-Twin nginx 설정
#
# 운영 노드 변경 시 아래 upstream 블록만 수정하면 됩니다.
#
# 배포:
#   sudo cp scalex-twin.conf /etc/nginx/sites-available/scalex-twin
#   sudo ln -sf /etc/nginx/sites-available/scalex-twin /etc/nginx/sites-enabled/scalex-twin
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── 서비스 주소 ─────────────────────────────────────────────
#   노드 이전 시 server 주소만 바꾸면 됩니다.
# ──────────────────────────────────────────────────────────

# React 앱 (npm start)
upstream react_app {
    server 127.0.0.1:3002;
}

# Query Server (FastAPI) — NodePort 또는 로컬 실행
upstream query_server {
    server 10.38.36.10:30183;
}

# Omniverse Kit WebRTC 시그널링
upstream omniverse_kit {
    server 127.0.0.1:49100;
}

# ── 서버 블록 ───────────────────────────────────────────────
server {
    listen 3001;
    server_name _;

    # ── Omniverse WebRTC 시그널링 ──────────────────────────
    location = /sign_in {
        proxy_pass         http://omniverse_kit;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    location /webrtc/ {
        proxy_pass         http://omniverse_kit/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # ── Query Server WebSocket ─────────────────────────────
    # /ws/로 시작하는 모든 경로 → query server
    location /ws/ {
        proxy_pass         http://query_server;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # ── Query Server REST API ──────────────────────────────
    location /turn-credentials {
        proxy_pass       http://query_server;
        proxy_set_header Host $host;
    }

    location ~ ^/(metrics|topology|health|replay|events)(/.*)?$ {
        proxy_pass       http://query_server;
        proxy_set_header Host $host;
    }

    # ── React 앱 (HMR WebSocket 포함) ──────────────────────
    # 위 경로에 매칭되지 않은 모든 요청 → React dev server
    location / {
        proxy_pass         http://react_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
